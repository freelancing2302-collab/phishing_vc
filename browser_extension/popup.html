<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard AI Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            min-width: 300px; 
            padding: 15px; 
            background: #f5f5f5;
        }
        h3 { 
            color: #1e90ff; 
            margin-bottom: 10px; 
            font-size: 18px;
        }
        input { 
            width: 100%; 
            padding: 8px; 
            margin-bottom: 10px; 
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        input:focus { 
            outline: none; 
            border-color: #1e90ff;
        }
        .button-group {
            display: flex;
            gap: 8px;
        }
        button { 
            flex: 1;
            padding: 8px; 
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        #checkBtn {
            background: #1e90ff;
            color: white;
        }
        #checkBtn:hover {
            background: #0d77cc;
        }
        #testBtn {
            background: #ffa500;
            color: white;
            padding: 6px;
        }
        #testBtn:hover {
            background: #ff8c00;
        }
        #result { 
            margin-top: 10px; 
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            white-space: pre-wrap;
            line-height: 1.5;
            display: none;
        }
        #result.show { display: block; }
        .status {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h3>🛡️ Check a URL</h3>
    <input type="text" id="urlInput" placeholder="https://example.com" />
    <div class="button-group">
        <button id="checkBtn">Check</button>
        <button id="testBtn" title="Test if backend is running">Test API</button>
    </div>
    <div id="result"></div>
    <div class="status" id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
